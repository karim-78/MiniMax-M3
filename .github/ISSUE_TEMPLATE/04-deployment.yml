name: 🧰 Deployment Issue
description: Problems running MiniMax-M2.7 on SGLang, vLLM, Transformers, NIM, ModelScope, or the API.
title: "[Deploy] "
labels: ["deployment", "m2.7-feedback"]
body:
  - type: dropdown
    id: framework
    attributes:
      label: Inference framework
      options:
        - SGLang
        - vLLM
        - Transformers
        - NVIDIA NIM
        - ModelScope
        - MiniMax API
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Framework version
      placeholder: e.g. vllm 0.6.3, sglang 0.4.1
    validations:
      required: false
  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: e.g. 8x H100 80GB, single A100
    validations:
      required: false
  - type: textarea
    id: command
    attributes:
      label: Launch command / config
      render: shell
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error / unexpected behavior
      description: Logs, stack traces, latency numbers, OOM details.
      render: text
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Workaround tried
    validations:
      required: false
